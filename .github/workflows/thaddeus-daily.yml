name: Thaddeus Daily Briefing

on:
  schedule:
    # 17:00 UTC = 1:00 PM EDT (summer). In winter (EST) this fires at 12:00 PM;
    # change to '0 18 * * *' after the November clock change if you care.
    - cron: '0 17 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and send briefing
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          DAY=$(tr -d '[:space:]' < state/day.txt)

          if [ "$DAY" -ge 22 ]; then
            TEXT=$(printf '*Day %s — AWS (SAA-C03 cert prep)*\nCert-prep pacing: work the SAA-C03 path today; drill check-ins 2-3x/week in practice-question format.\n<https://www.codecademy.com/learn/ext-paths/saa-c03-aws-certified-solutions-architect-associate|SAA-C03 Cert Prep>' "$DAY")
          else
            ROW=$(jq -c --argjson d "$DAY" '.[] | select(.day == $d)' curriculum.json)
            if [ -z "$ROW" ]; then
              echo "No curriculum entry for day $DAY" >&2
              exit 1
            fi
            MODULE=$(echo "$ROW" | jq -r '.module')
            OBJ=$(echo "$ROW" | jq -r '.objective')
            URL=$(echo "$ROW" | jq -r '.url')
            LABEL=$(echo "$ROW" | jq -r '.link_label')
            TEXT=$(printf '*Day %s — %s*\n%s\n<%s|%s>' "$DAY" "$MODULE" "$OBJ" "$URL" "$LABEL")
          fi

          jq -n --arg text "$TEXT" '{text: $text}' \
            | curl -sf -X POST -H 'Content-Type: application/json' -d @- "$SLACK_WEBHOOK_URL"
          echo "Briefing for Day $DAY sent."
