name: Thaddeus Daily Briefing

on:
  schedule:
    # 17:00 UTC = 1:00 PM EDT (summer). In winter (EST) this fires at 12:00 PM;
    # change to '0 18 * * *' after the November clock change if you care.
    - cron: '0 17 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and send briefing
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          DAY=$(tr -d '[:space:]' < state/day.txt)
          bash scripts/build_briefing.sh "$DAY" \
            | curl -sf -X POST -H 'Content-Type: application/json' -d @- "$SLACK_WEBHOOK_URL"
          echo "Briefing for Day $DAY sent."
